version: '3.9'

services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: evo_postgres
    environment:
      POSTGRES_DB: evo_core
      POSTGRES_USER: evo_user
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-evo_secret}
    # max_connections увеличен под масштаб: UVICORN_WORKERS × PG_POOL_MAX
    # с запасом (по умолчанию 4 × 25 = 100, запас до 300 на рост воркеров/пула,
    # плюс n8n/admin/служебные соединения). shared_buffers/work_mem — базовая
    # настройка под контейнер с 2-4 ГБ RAM, тюнить по факту нагрузки на проде.
    command: >
      postgres
      -c max_connections=300
      -c shared_buffers=512MB
      -c work_mem=16MB
      -c maintenance_work_mem=128MB
    ports:
      - "5432:5432"
    volumes:
      - evo_pgdata:/var/lib/postgresql/data
      - ./db/migrations/001_init.sql:/docker-entrypoint-initdb.d/001_init.sql
      - ./db/migrations/002_config.sql:/docker-entrypoint-initdb.d/002_config.sql
      - ./db/migrations/003_users_security.sql:/docker-entrypoint-initdb.d/003_users_security.sql
      - ./db/migrations/004_channel1_fields.sql:/docker-entrypoint-initdb.d/004_channel1_fields.sql
      - ./db/migrations/005_sessions.sql:/docker-entrypoint-initdb.d/005_sessions.sql
      - ./db/migrations/006_hnsw_index.sql:/docker-entrypoint-initdb.d/006_hnsw_index.sql
      - ./db/migrations/007_universal_fundamental.sql:/docker-entrypoint-initdb.d/007_universal_fundamental.sql
      - ./db/migrations/008_fix_ivfflat_cleanup.sql:/docker-entrypoint-initdb.d/008_fix_ivfflat_cleanup.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U evo_user -d evo_core"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: evo_redis
    ports:
      - "6379:6379"
    volumes:
      - evo_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      retries: 10

  api:
    build: .
    container_name: evo_api
    ports:
      - "8000:8000"
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./prompts:/app/prompts:ro
      - ./config:/app/config:ro
      - ./admin_ui.html:/app/admin_ui.html:ro
      - ./db/migrations:/app/db/migrations:ro
    environment:
      - UVICORN_WORKERS=${UVICORN_WORKERS:-4}
    # Продакшн: --workers N, без --reload (dev-режим, 1 процесс, авто-рестарт
    # на изменение файлов — недопустимо под нагрузку тысяч пользователей:
    # блокирует событийный цикл при любой правке и держит единственный процесс).
    # Для локальной разработки переопределить в docker-compose.override.yml
    # командой uvicorn ... --reload без --workers.
    command: >
      sh -c "uvicorn api.main:app --host 0.0.0.0 --port 8000 --workers ${UVICORN_WORKERS:-4}"

  # Блок 07 — Immune System reanimator workflow (см. n8n/README_n8n.md)
  n8n:
    image: n8nio/n8n
    container_name: evo_n8n
    ports:
      - "5678:5678"
    environment:
      - N8N_BASIC_AUTH_ACTIVE=true
      - N8N_BASIC_AUTH_USER=${N8N_BASIC_AUTH_USER:-admin}
      - N8N_BASIC_AUTH_PASSWORD=${N8N_BASIC_AUTH_PASSWORD:?N8N_BASIC_AUTH_PASSWORD не задан в .env}
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - OLLAMA_HOST=${OLLAMA_HOST:-http://host.docker.internal:11434}
      - EVO_API_SECRET=${EVO_API_SECRET}
    volumes:
      - evo_n8n_data:/home/node/.n8n
    depends_on:
      - api
    restart: unless-stopped
    # Воркфлоу n8n/evo_immune_system_workflow.json нужно импортировать вручную
    # через UI (Workflows → Import from File) и активировать — n8n не грузит
    # воркфлоу автоматически из файла при старте контейнера. После активации
    # прописать полученный webhook URL в N8N_WEBHOOK_URL (.env или Admin API,
    # см. n8n/README_n8n.md п.4). Изнутри docker-сети callback от воркфлоу
    # в ядро идёт на http://api:8000/api/v1/patch_callback.

  # Фаза 3 — публичный сайт
  site:
    image: nginx:alpine
    container_name: evo_site
    ports:
      - "80:80"
    volumes:
      - ./site:/usr/share/nginx/html:ro
      - ./site/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - api
    restart: unless-stopped

volumes:
  evo_pgdata:
  evo_redis_data:
  evo_n8n_data:

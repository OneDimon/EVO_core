<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EVO-core Admin</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: #0B0B0C; color: #F4F4F5; font-family: 'Inter', system-ui, sans-serif; min-height: 100vh; }
.header { background: #161618; border-bottom: 1px solid #2a2a2d; padding: 16px 32px; display: flex; align-items: center; gap: 16px; }
.logo { color: #00FF9C; font-weight: 700; font-size: 18px; letter-spacing: -0.5px; }
.status-dot { width: 8px; height: 8px; border-radius: 50%; background: #00FF9C; box-shadow: 0 0 6px #00FF9C; }
.container { max-width: 1200px; margin: 0 auto; padding: 32px; }
.grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(340px, 1fr)); gap: 20px; margin-bottom: 32px; }
.card { background: #161618; border: 1px solid #2a2a2d; border-radius: 12px; padding: 24px; }
.card h3 { color: #00FF9C; font-size: 13px; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 16px; }
.stat { display: flex; justify-content: space-between; align-items: center; padding: 8px 0; border-bottom: 1px solid #222; }
.stat:last-child { border-bottom: none; }
.stat-label { color: #888; font-size: 13px; }
.stat-value { color: #F4F4F5; font-size: 13px; font-family: 'JetBrains Mono', monospace; }
.stat-ok { color: #00FF9C; }
.stat-warn { color: #FFB800; }
.stat-err { color: #FF4444; }
.input-row { display: flex; gap: 8px; margin-bottom: 12px; }
input, select { background: #0d0d0f; border: 1px solid #2a2a2d; color: #F4F4F5; padding: 8px 12px; border-radius: 8px; font-size: 13px; width: 100%; outline: none; }
input:focus, select:focus { border-color: #00FF9C; }
button { background: #00FF9C; color: #0B0B0C; border: none; padding: 8px 16px; border-radius: 8px; font-size: 13px; font-weight: 600; cursor: pointer; white-space: nowrap; }
button:hover { background: #00e688; }
button.secondary { background: transparent; color: #00FF9C; border: 1px solid #00FF9C; }
.log-item { font-size: 12px; font-family: monospace; padding: 6px 8px; border-bottom: 1px solid #1a1a1c; }
.log-item .ts { color: #555; margin-right: 8px; }
.section-title { font-size: 20px; font-weight: 600; margin-bottom: 20px; color: #F4F4F5; }
.tag { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 11px; font-weight: 600; }
.tag-ok { background: rgba(0,255,156,0.15); color: #00FF9C; }
.tag-warn { background: rgba(255,184,0,0.15); color: #FFB800; }
.msg { padding: 8px 12px; border-radius: 8px; font-size: 12px; margin-top: 8px; }
.msg-ok { background: rgba(0,255,156,0.1); color: #00FF9C; border: 1px solid rgba(0,255,156,0.3); }
.msg-err { background: rgba(255,68,68,0.1); color: #FF4444; border: 1px solid rgba(255,68,68,0.3); }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useCallback } = React;
const API = '';  // same origin

function useAdminToken() {
  const [token, setToken] = useState(localStorage.getItem('evo_admin_token') || '');
  const save = (t) => { localStorage.setItem('evo_admin_token', t); setToken(t); };
  return [token, save];
}

async function apiFetch(path, opts = {}, token = '') {
  const r = await fetch(API + path, {
    ...opts,
    headers: { 'Content-Type': 'application/json',
                'X-Admin-Token': token, ...(opts.headers || {}) }
  });
  return r.json();
}

function StatusCard({ token }) {
  const [health, setHealth] = useState(null);
  const [config, setConfig] = useState([]);

  useEffect(() => {
    fetch('/health').then(r=>r.json()).then(setHealth).catch(()=>{});
    if (token) apiFetch('/api/v1/admin/config', {}, token)
      .then(d => setConfig(d.config || [])).catch(()=>{});
  }, [token]);

  const shardProvider = config.find(c=>c.key==='SHARD_PROVIDER')?.value || 'local';
  const tgOk = config.some(c=>c.key==='TG_BOT_TOKEN' && !c.value.includes('****None'));

  return (
    <div className="card">
      <h3>Статус системы</h3>
      <div className="stat">
        <span className="stat-label">API</span>
        <span className={health ? 'stat-ok' : 'stat-err'}>
          {health ? `✓ Phase ${health.phase}` : '✗ Недоступен'}
        </span>
      </div>
      <div className="stat">
        <span className="stat-label">Шарды</span>
        <span className="stat-value">{shardProvider}</span>
      </div>
      <div className="stat">
        <span className="stat-label">TG-бот</span>
        <span className={tgOk ? 'stat-ok' : 'stat-warn'}>{tgOk ? '✓ Настроен' : '⚠ Не настроен'}</span>
      </div>
      <div className="stat">
        <span className="stat-label">Конфигов в БД</span>
        <span className="stat-value">{config.length}</span>
      </div>
    </div>
  );
}

function ConfigPanel({ token }) {
  const [key, setKey] = useState('');
  const [value, setValue] = useState('');
  const [msg, setMsg] = useState(null);
  const [config, setConfig] = useState([]);
  const [filter, setFilter] = useState('');

  const categories = ['shards','telegram','ai','security','general'];

  const load = () => apiFetch('/api/v1/admin/config', {}, token)
    .then(d => setConfig(d.config || []));

  useEffect(() => { if (token) load(); }, [token]);

  const save = async () => {
    if (!key || !value) return setMsg({type:'err', text:'Заполни key и value'});
    const r = await apiFetch('/api/v1/admin/config',
      { method:'POST', body: JSON.stringify({key, value}) }, token);
    if (r.status === 'ok') {
      setMsg({type:'ok', text:`✓ ${key} сохранён`});
      setValue(''); load();
    } else setMsg({type:'err', text: r.detail || 'Ошибка'});
  };

  const filtered = filter
    ? config.filter(c => c.category === filter || c.key.toLowerCase().includes(filter))
    : config;

  return (
    <div className="card" style={{gridColumn:'span 2'}}>
      <h3>Конфигурация и токены</h3>
      <div className="input-row">
        <select onChange={e=>setKey(e.target.value)} value={key} style={{width:200}}>
          <option value="">Выбрать ключ...</option>
          {['TG_BOT_TOKEN','TG_ADMIN_CHAT_ID','SHARD_PROVIDER','SHARD_GDRIVE_TOKEN',
            'SHARD_GDRIVE_FOLDER','SHARD_GITHUB_TOKEN','SHARD_GITHUB_REPO',
            'SHARD_R2_ACCOUNT_ID','SHARD_R2_ACCESS_KEY','SHARD_R2_SECRET_KEY',
            'SHARD_R2_BUCKET','GEMINI_API_KEY','OLLAMA_HOST','N8N_WEBHOOK_URL',
            'EVO_SERVER_URL'].map(k =>
            <option key={k} value={k}>{k}</option>
          )}
        </select>
        <input placeholder="или введи ключ вручную" value={key} onChange={e=>setKey(e.target.value)} style={{flex:1}}/>
        <input placeholder="значение" value={value} onChange={e=>setValue(e.target.value)} style={{flex:2}}/>
        <button onClick={save}>Сохранить</button>
      </div>
      {msg && <div className={`msg msg-${msg.type}`}>{msg.text}</div>}

      <div style={{marginTop:16, display:'flex', gap:8, flexWrap:'wrap', marginBottom:12}}>
        <button className="secondary" onClick={()=>setFilter('')} style={{padding:'4px 10px',fontSize:11}}>Все</button>
        {categories.map(c=>(
          <button key={c} className="secondary" onClick={()=>setFilter(c)} style={{padding:'4px 10px',fontSize:11}}>{c}</button>
        ))}
      </div>

      <div style={{maxHeight:280, overflowY:'auto'}}>
        {filtered.map(c=>(
          <div key={c.key} className="stat">
            <span className="stat-label">{c.key}</span>
            <div style={{display:'flex',gap:8,alignItems:'center'}}>
              <span className="tag tag-ok">{c.category}</span>
              <span className="stat-value" style={{maxWidth:200,overflow:'hidden',textOverflow:'ellipsis'}}>{c.value}</span>
            </div>
          </div>
        ))}
      </div>
    </div>
  );
}

function ShardTestCard({ token }) {
  const [result, setResult] = useState(null);
  const [loading, setLoading] = useState(false);

  const test = async () => {
    setLoading(true);
    const r = await apiFetch('/api/v1/admin/shards/test', {}, token);
    setResult(r);
    setLoading(false);
  };

  return (
    <div className="card">
      <h3>Тест шардов</h3>
      <p style={{color:'#888',fontSize:12,marginBottom:16}}>Проверить подключение к провайдеру шардов</p>
      <button onClick={test} disabled={loading}>{loading ? 'Тестирую...' : 'Запустить тест'}</button>
      {result && (
        <div className={`msg msg-${result.status==='ok'?'ok':'err'}`} style={{marginTop:12}}>
          {result.status === 'ok' ? `✓ Шард работает: ${result.path}` : `✗ Ошибка: ${result.error}`}
        </div>
      )}
    </div>
  );
}

function TelegramSetup({ token }) {
  const [serverUrl, setServerUrl] = useState('');
  const [result, setResult] = useState(null);

  const setup = async () => {
    const r = await apiFetch('/api/v1/tg/setup',
      { method:'POST', body: JSON.stringify({server_url: serverUrl}) }, token);
    setResult(r);
  };

  return (
    <div className="card">
      <h3>Telegram Webhook</h3>
      <p style={{color:'#888',fontSize:12,marginBottom:12}}>Настроить приём ответов Архитектора</p>
      <div className="input-row">
        <input placeholder="https://your-server.com" value={serverUrl}
          onChange={e=>setServerUrl(e.target.value)}/>
        <button onClick={setup}>Настроить</button>
      </div>
      {result && (
        <div className={`msg msg-${result.status==='ok'?'ok':'err'}`}>
          {result.status === 'ok'
            ? `✓ Webhook: ${result.webhook_url}`
            : `✗ ${JSON.stringify(result.tg_response)}`}
        </div>
      )}
    </div>
  );
}

function AuditLog({ token }) {
  const [logs, setLogs] = useState([]);

  useEffect(() => {
    if (token) apiFetch('/api/v1/admin/audit-log?limit=30', {}, token)
      .then(d => setLogs(d.audit_log || []));
  }, [token]);

  return (
    <div className="card" style={{gridColumn:'span 2'}}>
      <h3>Audit Log</h3>
      <div style={{maxHeight:240,overflowY:'auto'}}>
        {logs.length === 0 && <p style={{color:'#555',fontSize:12}}>Нет записей</p>}
        {logs.map((l,i)=>(
          <div key={i} className="log-item">
            <span className="ts">{new Date(l.ts).toLocaleTimeString()}</span>
            <span className="tag tag-ok" style={{marginRight:8}}>{l.action}</span>
            <span style={{color:'#ccc'}}>{l.target}</span>
            {l.actor && <span style={{color:'#555',marginLeft:8}}>by {l.actor}</span>}
          </div>
        ))}
      </div>
    </div>
  );
}

function App() {
  const [token, setToken] = useAdminToken();
  const [tokenInput, setTokenInput] = useState('');
  const [authed, setAuthed] = useState(false);

  const login = async () => {
    const r = await apiFetch('/api/v1/admin/config', {}, tokenInput);
    if (r.config !== undefined) {
      setToken(tokenInput);
      setAuthed(true);
    } else {
      alert('Неверный токен');
    }
  };

  useEffect(() => {
    if (token) apiFetch('/api/v1/admin/config',{},token)
      .then(r => { if (r.config) setAuthed(true); });
  }, []);

  if (!authed) return (
    <div style={{display:'flex',alignItems:'center',justifyContent:'center',minHeight:'100vh'}}>
      <div className="card" style={{width:360}}>
        <h3 style={{marginBottom:16}}>EVO-core Admin</h3>
        <input type="password" placeholder="X-Admin-Token"
          value={tokenInput} onChange={e=>setTokenInput(e.target.value)}
          onKeyDown={e=>e.key==='Enter'&&login()}/>
        <button onClick={login} style={{marginTop:12,width:'100%'}}>Войти</button>
      </div>
    </div>
  );

  return (
    <>
      <div className="header">
        <div className="status-dot"/>
        <span className="logo">EVO-core Admin</span>
        <span style={{color:'#555',fontSize:12,marginLeft:'auto'}}>
          {new Date().toLocaleDateString('ru')}
        </span>
      </div>
      <div className="container">
        <div className="grid">
          <StatusCard token={token}/>
          <ShardTestCard token={token}/>
          <TelegramSetup token={token}/>
          <ConfigPanel token={token}/>
          <AuditLog token={token}/>
        </div>
      </div>
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
